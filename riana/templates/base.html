<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Plan App{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@^2/dist/tailwind.min.css">
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
  <!-- Navigation -->
  <nav class="bg-white shadow">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <!--a href="/" class="flex items-center">
        <img src="{{ MEDIA_URL }}logo.png" alt="Plan Logo" class="h-10">
      </a-->
      <div class="space-x-4">
        {% if user.is_authenticated %}
          <a href="{% url 'calc' %}" class="text-blue-600 hover:underline">Thermal calc</a>
          <a href="{% url 'pred' %}" class="text-blue-600 hover:underline">Prediction</a>
          <a href="{% url 'manual' %}" class="text-blue-600 hover:underline">Manual</a>
          <a href="{% url 'contact' %}" class="text-blue-600 hover:underline">Contact</a>
          <a href="{% url 'logout' %}"  class="text-red-600 hover:underline">Logout</a>
        {% else %}
          <a href="{% url 'login' %}"    class="text-blue-600 hover:underline">Login</a>
          <a href="{% url 'contact' %}" class="text-blue-600 hover:underline">Contact</a>
          <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto px-4 py-6">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
  </main>
</body>
</html>
